name: nexa

services:
  postgres:
    image: postgres:17-alpine
    container_name: nexa-postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexa
      POSTGRES_USER: user
    ports:
      - "5432:5432"
    volumes:
      - nexa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d nexa"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis
    container_name: nexa-redis
    ports:
      - "6379:6379"
    volumes:
      - nexa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  nexa_postgres_data:
  nexa_redis_data:
